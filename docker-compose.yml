services:
  postgres:
    image: ${POSTGRES_IMAGE:?POSTGRES_IMAGE is required}
    container_name: ${POSTGRES_CONTAINER_NAME:?POSTGRES_CONTAINER_NAME is required}
    restart: ${POSTGRES_RESTART_POLICY:?POSTGRES_RESTART_POLICY is required}
    environment:
      POSTGRES_USER: ${POSTGRES_USER:?POSTGRES_USER is required}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_DB:?POSTGRES_DB is required}
    ports:
      - "${POSTGRES_HOST_PORT:?POSTGRES_HOST_PORT is required}:${POSTGRES_CONTAINER_PORT:?POSTGRES_CONTAINER_PORT is required}"
    command:
      - postgres
      - -c
      - max_connections=${POSTGRES_MAX_CONNECTIONS:?POSTGRES_MAX_CONNECTIONS is required}
      - -c
      - shared_buffers=${POSTGRES_SHARED_BUFFERS:?POSTGRES_SHARED_BUFFERS is required}
      - -c
      - effective_cache_size=${POSTGRES_EFFECTIVE_CACHE_SIZE:?POSTGRES_EFFECTIVE_CACHE_SIZE is required}
      - -c
      - maintenance_work_mem=${POSTGRES_MAINTENANCE_WORK_MEM:?POSTGRES_MAINTENANCE_WORK_MEM is required}
      - -c
      - checkpoint_completion_target=${POSTGRES_CHECKPOINT_COMPLETION_TARGET:?POSTGRES_CHECKPOINT_COMPLETION_TARGET is required}
      - -c
      - wal_buffers=${POSTGRES_WAL_BUFFERS:?POSTGRES_WAL_BUFFERS is required}
      - -c
      - default_statistics_target=${POSTGRES_DEFAULT_STATISTICS_TARGET:?POSTGRES_DEFAULT_STATISTICS_TARGET is required}
      - -c
      - random_page_cost=${POSTGRES_RANDOM_PAGE_COST:?POSTGRES_RANDOM_PAGE_COST is required}
      - -c
      - work_mem=${POSTGRES_WORK_MEM:?POSTGRES_WORK_MEM is required}
    volumes:
      - fincoach-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: ${POSTGRES_HEALTHCHECK_INTERVAL:?POSTGRES_HEALTHCHECK_INTERVAL is required}
      timeout: ${POSTGRES_HEALTHCHECK_TIMEOUT:?POSTGRES_HEALTHCHECK_TIMEOUT is required}
      retries: ${POSTGRES_HEALTHCHECK_RETRIES:?POSTGRES_HEALTHCHECK_RETRIES is required}
      start_period: ${POSTGRES_HEALTHCHECK_START_PERIOD:?POSTGRES_HEALTHCHECK_START_PERIOD is required}

volumes:
  fincoach-postgres-data:
